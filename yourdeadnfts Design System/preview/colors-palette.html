<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#0a0907;font-family:var(--font-sans);color:var(--text-main)}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .sw{border-radius:8px;overflow:hidden;border:1px solid var(--border-primary)}
  .chip{height:62px}
  .lbl{padding:6px 8px;font-family:var(--font-mono);font-size:10px;line-height:1.3;background:var(--bg-card)}
  .name{color:var(--text-main);font-weight:600;letter-spacing:.03em}
  .hex{color:var(--text-muted);text-transform:uppercase}
</style></head><body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:#0a0907"></div><div class="lbl"><div class="name">dark-1</div><div class="hex">#0A0907</div></div></div>
  <div class="sw"><div class="chip" style="background:#14120e"></div><div class="lbl"><div class="name">dark-2</div><div class="hex">#14120E</div></div></div>
  <div class="sw"><div class="chip" style="background:#1c1a16"></div><div class="lbl"><div class="name">dark-3</div><div class="hex">#1C1A16</div></div></div>
  <div class="sw"><div class="chip" style="background:#2a2620"></div><div class="lbl"><div class="name">dark-4</div><div class="hex">#2A2620</div></div></div>
  <div class="sw"><div class="chip" style="background:#433d33"></div><div class="lbl"><div class="name">dark-5</div><div class="hex">#433D33</div></div></div>
  <div class="sw"><div class="chip" style="background:#a85a3e"></div><div class="lbl"><div class="name">rust</div><div class="hex">#A85A3E</div></div></div>
  <div class="sw"><div class="chip" style="background:#c27550"></div><div class="lbl"><div class="name">rust-hover</div><div class="hex">#C27550</div></div></div>
  <div class="sw"><div class="chip" style="background:#6b8e5c"></div><div class="lbl"><div class="name">moss</div><div class="hex">#6B8E5C</div></div></div>
  <div class="sw"><div class="chip" style="background:#8b2a2a"></div><div class="lbl"><div class="name">blood</div><div class="hex">#8B2A2A</div></div></div>
  <div class="sw"><div class="chip" style="background:#d9d2bf"></div><div class="lbl"><div class="name">bone</div><div class="hex">#D9D2BF</div></div></div>
</div>
</body></html>
