<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#0a0907;font-family:var(--font-sans);color:var(--text-main);background-image:url('../assets/topography.svg');background-size:900px}
  .wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .card{background:rgba(20,18,14,.82);border:1px solid var(--border-primary);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;transition:border-color .2s}
  .card.hover{border-color:rgba(168,90,62,.35)}
  .art{position:relative;aspect-ratio:1;background:var(--bg-surface);display:flex;align-items:center;justify-content:center;overflow:hidden}
  .art .skull{width:48px;height:48px;stroke:#433d33;fill:none;stroke-width:1.6}
  .art.img-1{background:radial-gradient(circle at 30% 30%,#5a3826,#1a1410 70%)}
  .art.img-2{background:radial-gradient(circle at 70% 40%,#3a5043,#14120e 75%)}
  .stamp{position:absolute;top:12px;right:-6px;padding:3px 10px;border-top:1px solid var(--color-danger);border-bottom:1px solid var(--color-danger);color:var(--color-danger);font-family:var(--font-mono);font-size:9px;letter-spacing:.2em;transform:rotate(-3deg);background:rgba(11,14,17,.55);backdrop-filter:blur(4px)}
  .body{padding:12px 14px 14px;display:flex;flex-direction:column;gap:6px}
  .col{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-muted)}
  .name{font-family:var(--font-sans);font-size:13px;font-weight:600;color:var(--text-main)}
  .id{font-family:var(--font-mono);font-size:11px;color:var(--text-secondary)}
  .upg{margin-top:10px;padding:8px 0;background:transparent;color:var(--color-primary);border:1px solid var(--border-secondary);border-radius:6px;font:600 11.5px var(--font-sans);cursor:pointer}
  .upg:hover,.card.hover .upg{border-color:var(--color-primary)}
</style></head><body>
<div class="wrap">
  <div class="card">
    <div class="art img-1"><svg class="skull" viewBox="0 0 24 24"><circle cx="9" cy="12" r="1.3"/><circle cx="15" cy="12" r="1.3"/><path d="M4.5 11a7.5 7.5 0 1 1 15 0v5a2 2 0 0 1-2 2h-1v2h-2v-2h-4v2h-2v-2h-1a2 2 0 0 1-2-2z"/></svg><span class="stamp">DEAD · 2Y</span></div>
    <div class="body"><div class="col">Bored Apes BNB</div><div class="name">Ape #4417</div><div class="id">Token #4417</div><button class="upg">Upgrade to Agent</button></div>
  </div>
  <div class="card hover">
    <div class="art img-2"><svg class="skull" viewBox="0 0 24 24"><circle cx="9" cy="12" r="1.3"/><circle cx="15" cy="12" r="1.3"/><path d="M4.5 11a7.5 7.5 0 1 1 15 0v5a2 2 0 0 1-2 2h-1v2h-2v-2h-4v2h-2v-2h-1a2 2 0 0 1-2-2z"/></svg><span class="stamp">DEAD · 14M</span></div>
    <div class="body"><div class="col">Pancake Bunnies</div><div class="name">Bunny #0092</div><div class="id">Token #92</div><button class="upg">Upgrade to Agent</button></div>
  </div>
  <div class="card">
    <div class="art"><svg class="skull" viewBox="0 0 24 24"><circle cx="9" cy="12" r="1.3"/><circle cx="15" cy="12" r="1.3"/><path d="M4.5 11a7.5 7.5 0 1 1 15 0v5a2 2 0 0 1-2 2h-1v2h-2v-2h-4v2h-2v-2h-1a2 2 0 0 1-2-2z"/></svg><span class="stamp">DEAD · 3Y</span></div>
    <div class="body"><div class="col">Unknown Collection</div><div class="name" style="color:var(--text-secondary)">Untitled #1</div><div class="id">Token #1</div><button class="upg">Connect & Upgrade</button></div>
  </div>
</div>
</body></html>
