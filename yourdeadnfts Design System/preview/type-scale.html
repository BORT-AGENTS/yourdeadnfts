<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px;background:#0a0907;color:var(--text-main)}
  .row{display:grid;grid-template-columns:130px 1fr;gap:14px;padding:8px 0;border-bottom:1px solid var(--border-primary);align-items:baseline}
  .row:last-child{border:0}
  .tok{font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}
  .hero{font-family:var(--font-sans);font-size:44px;font-weight:800;letter-spacing:-.03em;line-height:1;background:linear-gradient(135deg,var(--text-main) 40%,var(--color-primary) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .h2{font-family:var(--font-sans);font-size:22px;font-weight:700;letter-spacing:-.01em}
  .body{font-family:var(--font-sans);font-size:14px;color:var(--text-secondary)}
  .ob{font-family:var(--font-serif);font-size:26px}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);letter-spacing:.2em;text-transform:uppercase}
</style></head><body>
<div class="row"><span class="tok">hero · 800</span><span class="hero">Your NFTs are dead.</span></div>
<div class="row"><span class="tok">h2 · 700</span><span class="h2">Choose agent type</span></div>
<div class="row"><span class="tok">obituary · serif</span><span class="ob">3 dead across 2 collections</span></div>
<div class="row"><span class="tok">body · 400</span><span class="body">Paste a wallet to see dead NFTs sitting idle for over a year.</span></div>
<div class="row"><span class="tok">meta · mono</span><span class="meta">SCAN 0x1234…5678 · YOUR WALLET</span></div>
</body></html>
