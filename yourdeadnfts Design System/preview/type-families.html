<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#0a0907;color:var(--text-main)}
  .fam{display:grid;grid-template-columns:84px 1fr;gap:16px;padding:14px 0;border-bottom:1px solid var(--border-primary);align-items:center}
  .fam:last-child{border:0}
  .lbl{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);letter-spacing:.2em;text-transform:uppercase}
  .sans{font-family:var(--font-sans);font-size:28px;font-weight:700;letter-spacing:-.02em}
  .serif{font-family:var(--font-serif);font-size:30px;font-weight:400;letter-spacing:-.01em}
  .mono{font-family:var(--font-mono);font-size:16px;letter-spacing:.05em}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);margin-top:4px}
</style></head><body>
<div class="fam"><span class="lbl">Sans</span><div><div class="sans">Your NFTs are dead.</div><div class="meta">IBM Plex Sans · 400 500 600 700 800</div></div></div>
<div class="fam"><span class="lbl">Serif</span><div><div class="serif">12 dead across 3 collections</div><div class="meta">IBM Plex Serif · 400 500 600 700</div></div></div>
<div class="fam"><span class="lbl">Mono</span><div><div class="mono">0x742d...F0bEb · DEAD · 2Y</div><div class="meta">IBM Plex Mono · 400 500 600</div></div></div>
</body></html>
