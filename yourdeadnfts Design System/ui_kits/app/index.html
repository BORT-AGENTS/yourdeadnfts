<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>yourdeadnfts — UI kit</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  /* Minimal overrides/extensions that aren't in colors_and_type.css.
     The ported visual rules below are a trimmed copy of the repo's
     src/styles/index.css — only the classes this kit renders. */
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{overflow-x:hidden}
  .mono{font-family:var(--font-mono)}
  .text-muted{color:var(--text-muted)}

  .app{position:relative;min-height:100vh;display:flex;flex-direction:column}
  .main{position:relative;z-index:1;flex:1;width:100%;max-width:1100px;margin:0 auto;padding:0 48px}

  /* Background — topography + drifting orbs */
  .topo-bg{position:fixed;inset:0;z-index:0;pointer-events:none;background:#0d1013 url('./topography.svg') center/cover no-repeat}
  .bg-orbs{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
  .bg-orb{position:absolute;border-radius:50%;filter:blur(180px);opacity:.06;animation:float 30s ease-in-out infinite}
  .bg-orb-1{width:900px;height:900px;background:radial-gradient(circle,var(--bnb-red) 0%,transparent 70%);top:-300px;left:-200px}
  .bg-orb-2{width:800px;height:800px;background:radial-gradient(circle,var(--color-primary) 0%,transparent 70%);bottom:-300px;right:-100px;animation-delay:10s}
  .bg-orb-3{width:700px;height:700px;background:radial-gradient(circle,var(--color-accent) 0%,transparent 70%);top:40%;right:25%;animation-delay:20s}
  @keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.03)}66%{transform:translate(-20px,15px) scale(.97)}}
  @keyframes fadeInUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  /* Header */
  .header{position:relative;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:20px 48px;border-bottom:1px solid var(--border-primary);background:rgba(11,14,17,.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
  .header-logo{display:inline-flex;align-items:center;gap:10px;background:transparent;border:none;padding:0;font-family:inherit;cursor:pointer;color:inherit;transition:opacity .2s}
  .header-logo:hover{opacity:.8}
  .header-title{font-weight:700;font-size:16px;letter-spacing:-.01em;color:var(--text-main)}
  .header-right{display:flex;align-items:center;gap:24px}
  .header-link,.header-connect,.wallet-pill{display:inline-flex;align-items:center;gap:7px;background:transparent;border:none;padding:0;font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;transition:color .2s}
  .header-link{color:var(--text-muted)}
  .header-link:hover{color:var(--color-primary)}
  .header-connect{color:var(--color-primary)}
  .header-connect:hover{color:var(--color-primary-hover)}
  .wallet-pill{color:var(--text-muted)}
  .wallet-pill:hover{color:var(--color-primary)}
  .pill-label{color:var(--text-muted)}
  .pill-address{color:var(--text-main);border-bottom:1px solid var(--color-primary);padding-bottom:1px;letter-spacing:.05em}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 20px;font-size:14px;font-weight:600;border:none;border-radius:var(--radius-md);cursor:pointer;transition:all .2s;white-space:nowrap}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn-primary{background:var(--color-primary);color:#0b0e11;font-weight:700}
  .btn-primary:hover:not(:disabled){background:var(--color-primary-hover);transform:translateY(-1px);box-shadow:0 4px 16px rgba(168,90,62,.3)}
  .btn-secondary{background:var(--bg-card);color:var(--text-main);border:1px solid var(--border-secondary)}
  .btn-secondary:hover:not(:disabled){background:var(--bg-elevated);transform:translateY(-1px);border-color:var(--color-primary)}
  .btn-sm{padding:7px 14px;font-size:13px}
  .btn-full{width:100%}
  .btn-ghost-link{display:inline-flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--text-secondary);font-size:13px;font-weight:500;cursor:pointer;padding:8px 4px;transition:color .2s;font-family:inherit}
  .btn-ghost-link:hover:not(:disabled){color:var(--color-primary)}
  .btn-ghost-link>span{text-decoration:underline;text-decoration-color:var(--border-primary);text-underline-offset:3px}
  .btn-ghost-link:hover:not(:disabled)>span{text-decoration-color:var(--color-primary)}
  .btn-hero{display:inline-flex;align-items:center;justify-content:center;gap:10px;height:48px;padding:0 28px;font-size:14px;font-weight:700;color:#0b0e11;background:var(--color-primary);border:none;border-radius:var(--radius-md);cursor:pointer;transition:all .25s;box-shadow:0 4px 24px rgba(168,90,62,.3);white-space:nowrap;font-family:inherit}
  .btn-hero:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 32px rgba(168,90,62,.4);background:var(--color-primary-hover)}
  .btn-hero:disabled{opacity:.6;cursor:not-allowed;transform:none}

  /* Hero */
  .hero{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;text-align:center;padding:120px 20px 80px;max-width:640px;margin:0 auto;animation:fadeInUp .5s ease-out}
  .hero-title{font-size:clamp(2.4rem,4vw,3.5rem);font-weight:800;line-height:1.12;letter-spacing:-.03em;margin-bottom:20px;background:linear-gradient(135deg,var(--text-main) 40%,var(--color-primary) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .hero-sub{font-size:1rem;color:var(--text-secondary);line-height:1.6;margin-bottom:40px}
  .search-bar{display:flex;gap:10px;width:100%;max-width:560px;margin-bottom:16px;align-items:stretch}
  .search-input-wrap{position:relative;flex:1;display:flex;align-items:center}
  .search-input{flex:1;width:100%;height:48px;padding:0 16px 0 40px;border-radius:var(--radius-md);background:var(--bg-surface);border:1px solid var(--border-primary);color:var(--text-main);font-family:var(--font-mono);font-size:13px;outline:none;transition:all .2s}
  .search-input:focus{border-color:var(--color-primary);box-shadow:0 0 0 3px rgba(168,90,62,.1)}
  .search-input::placeholder{color:var(--text-muted)}

  /* Demo hint — not part of the shipped product, clearly marked. */
  .demo-hint{margin-top:28px;display:inline-flex;gap:10px;align-items:center;font-size:10.5px;letter-spacing:.12em;color:var(--text-muted);text-transform:uppercase}
  .demo-hint button{background:transparent;border:1px dashed var(--border-primary);color:var(--text-secondary);font-family:var(--font-mono);font-size:10.5px;letter-spacing:.08em;padding:4px 10px;border-radius:4px;cursor:pointer}
  .demo-hint button:hover{color:var(--color-primary);border-color:var(--border-secondary)}

  /* Results */
  .results{padding:32px 0 60px;animation:fadeInUp .4s ease-out}
  .results-meta{display:flex;align-items:baseline;justify-content:space-between;gap:24px;padding:6px 0 14px;margin-bottom:28px;border-bottom:1px solid var(--border-primary);font-family:var(--font-mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-muted);flex-wrap:wrap}
  .scan-label{color:var(--text-muted);margin-right:10px}
  .scan-addr{color:var(--text-main);border-bottom:1px solid var(--color-primary);padding-bottom:2px;letter-spacing:.05em}
  .scan-tag{color:var(--bnb-green);margin-left:10px;letter-spacing:.2em}
  .scan-return{background:transparent;border:none;color:var(--text-muted);font-family:inherit;font-size:inherit;letter-spacing:inherit;text-transform:inherit;cursor:pointer;padding:0;transition:color .2s}
  .scan-return:hover{color:var(--color-primary)}
  .obituary{font-family:var(--font-serif);font-size:1.6rem;font-weight:400;color:var(--text-main);margin-bottom:32px;letter-spacing:-.005em;line-height:1.25}
  .obituary .ob-num{color:var(--color-primary);font-weight:600;font-size:2.2rem;font-family:var(--font-serif);letter-spacing:-.02em}

  /* NFT grid + card */
  .nft-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
  .nft-card{display:flex;flex-direction:column;background:transparent;border:1px solid var(--border-primary);border-radius:var(--radius-lg);overflow:hidden;transition:border-color .2s}
  .nft-card:hover{border-color:rgba(168,90,62,.35)}
  .nft-card__visual{position:relative;height:200px;background:var(--bg-surface);overflow:hidden}
  .nft-image{width:100%;height:100%;object-fit:cover;display:block}
  .dead-badge{position:absolute;top:12px;left:12px;padding:4px 9px;border-top:1px solid rgba(194,117,80,.95);border-bottom:1px solid rgba(194,117,80,.95);border-radius:0;background:rgba(10,9,7,.55);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);color:#c27550;font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;transform:rotate(-3deg);transform-origin:top left}
  .nft-card__head{display:flex;justify-content:space-between;align-items:baseline;gap:8px;padding:14px 16px 0}
  .nft-collection{font-weight:600;font-size:.95rem;color:var(--text-main);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
  .nft-token-id{font-size:13px;color:var(--text-secondary);flex-shrink:0}
  .nft-card__meta{padding:6px 16px 12px}
  .nft-contract{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted)}
  .nft-card__action{padding:0 16px 14px}

  /* Scanning / empty */
  .scan-progress{display:flex;flex-direction:column;align-items:center;gap:16px;padding:80px 0;color:var(--text-secondary);font-size:14px}
  .spinner{width:36px;height:36px;border:2px solid var(--border-primary);border-top:2px solid var(--color-primary);border-radius:50%;animation:spin .8s linear infinite}
  .spinner-sm{width:14px;height:14px;border:2px solid rgba(11,14,17,.3);border-top:2px solid #0b0e11;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
  .empty-state{display:flex;flex-direction:column;align-items:center;gap:16px;background:var(--bg-surface);border:1px dashed var(--border-primary);border-radius:var(--radius-xl);padding:60px 40px;text-align:center}
  .empty-state-title{font-size:1.35rem;font-weight:700;color:var(--text-main)}
  .empty-state-description{font-size:.95rem;color:var(--text-secondary);max-width:400px;line-height:1.6}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;animation:fadeIn .15s ease-out}
  .modal{background:var(--bg-card);border:1px solid var(--border-primary);border-radius:var(--radius-xl);width:100%;max-width:480px;padding:28px;position:relative;animation:fadeInUp .25s ease-out;box-shadow:0 8px 32px rgba(0,0,0,.5)}
  .modal-close{position:absolute;top:14px;right:14px;background:transparent;border:none;color:var(--text-secondary);cursor:pointer;padding:6px;border-radius:var(--radius-sm);display:inline-flex;transition:all .2s}
  .modal-close:hover{color:var(--text-main);background:var(--bg-elevated)}
  .modal-nft-preview{display:flex;align-items:center;gap:14px;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border-primary)}
  .modal-nft-image{width:56px;height:56px;border-radius:var(--radius-md);object-fit:cover;border:1px solid var(--border-primary)}
  .modal-nft-name{font-weight:600;font-size:14px;color:var(--text-main);margin-bottom:3px}
  .modal-step h3{font-size:16px;font-weight:700;color:var(--text-main);margin-bottom:10px}
  .modal-step p{color:var(--text-secondary);font-size:13px;line-height:1.6;margin-bottom:20px}
  .modal-center{display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center;padding:16px 0}
  .modal-center h3{margin:0}
  .modal-center p{margin:0 0 12px}
  .template-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
  .template-card{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:var(--radius-md);text-align:left;background:var(--bg-surface);border:1px solid var(--border-primary);cursor:pointer;transition:all .2s;font-family:inherit;color:var(--text-main)}
  .template-card:hover{border-color:var(--color-primary);background:var(--bg-elevated)}
  .template-icon{width:36px;height:36px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:rgba(168,90,62,.1);border:1px solid rgba(168,90,62,.2);border-radius:var(--radius-md);color:var(--color-primary)}
  .template-body{flex:1;min-width:0}
  .template-name{font-weight:700;font-size:13px;color:var(--text-main);margin-bottom:2px}
  .template-desc{font-size:11px;color:var(--text-secondary);line-height:1.4}
  .modal-fee{text-align:center;font-size:12px;color:var(--text-secondary);margin-top:4px}
  .modal-fee strong{color:var(--color-primary);font-weight:700}
  .modal-error{color:var(--bnb-red);font-size:12px;margin-top:12px;padding:10px 14px;background:rgba(139,42,42,.08);border:1px solid rgba(139,42,42,.2);border-radius:var(--radius-md);text-align:center}
  .done-icon{width:56px;height:56px;border-radius:50%;background:rgba(107,142,92,.15);color:var(--bnb-green);border:2px solid rgba(107,142,92,.3);display:flex;align-items:center;justify-content:center}
  .tx-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--text-secondary)}
  .tx-link:hover{color:var(--color-primary)}

  /* Footer */
  .footer{position:relative;z-index:1;padding:20px 48px;text-align:center;font-size:12px;color:var(--text-muted);border-top:1px solid var(--border-primary)}
  .footer a{color:var(--color-primary)}

  @media (max-width:900px){.header,.footer{padding:16px 24px}.main{padding:0 24px}.hero{padding:48px 20px 60px}}
  @media (max-width:768px){.hero-title{font-size:2rem}.search-bar{flex-direction:column}.btn-hero{width:100%;justify-content:center}}
</style>
</head>
<body>
<div id="root"></div>

<!-- React + Babel (pinned) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>

<script src="./mock-data.js"></script>
<script type="text/babel" src="./Header.jsx"></script>
<script type="text/babel" src="./AddressInput.jsx"></script>
<script type="text/babel" src="./NFTCard.jsx"></script>
<script type="text/babel" src="./ScanResults.jsx"></script>
<script type="text/babel" src="./UpgradeModal.jsx"></script>

<script type="text/babel">
function App() {
  const [account, setAccount] = React.useState(null);
  const [searchAddress, setSearchAddress] = React.useState('');
  const [scanState, setScanState] = React.useState('idle'); // 'idle' | 'scanning' | 'done'
  const [deadNFTs, setDeadNFTs] = React.useState([]);
  const [progress, setProgress] = React.useState('');
  const [selectedNFT, setSelectedNFT] = React.useState(null);

  const handleScan = React.useCallback(async (address) => {
    setSearchAddress(address);
    setScanState('scanning');
    setDeadNFTs([]);

    // Simulate the real scanner progression.
    const steps = [
      'Fetching NFT balances...',
      'Checking last activity per token...',
      'Walking transfer logs...',
      'Filtering tokens idle > 1 year...',
    ];
    for (let i = 0; i < steps.length; i++) {
      setProgress(steps[i]);
      await new Promise((r) => setTimeout(r, 450));
    }

    const results = address.toLowerCase() === window.MOCK_WALLET_EMPTY.toLowerCase()
      ? []
      : window.MOCK_NFTS;
    setDeadNFTs(results);
    setScanState('done');
  }, []);

  const connectWallet = async () => {
    const addr = window.MOCK_WALLET;
    setAccount(addr);
    handleScan(addr);
  };

  const connectFromModal = async () => {
    setAccount(window.MOCK_WALLET);
  };

  const disconnectWallet = () => setAccount(null);

  const handleBack = () => {
    setScanState('idle');
    setDeadNFTs([]);
    setSearchAddress('');
  };

  // Re-render lucide icons whenever the tree changes.
  React.useEffect(() => {
    if (window.lucide) window.lucide.createIcons();
  });

  return (
    <div className="app">
      <div className="bg-orbs">
        <div className="bg-orb bg-orb-1" />
        <div className="bg-orb bg-orb-2" />
        <div className="bg-orb bg-orb-3" />
      </div>
      <div className="topo-bg" />

      <window.Header
        account={account}
        onConnectWallet={connectWallet}
        onDisconnect={disconnectWallet}
        onHome={handleBack}
      />

      <main className="main">
        {scanState === 'idle' && (
          <window.AddressInput
            onScan={handleScan}
            scanning={false}
            onConnectWallet={connectWallet}
          />
        )}
        {(scanState === 'scanning' || scanState === 'done') && (
          <window.ScanResults
            address={searchAddress}
            deadNFTs={deadNFTs}
            scanning={scanState === 'scanning'}
            progress={progress}
            account={account}
            onUpgrade={setSelectedNFT}
            onBack={handleBack}
          />
        )}
      </main>

      {selectedNFT && (
        <window.UpgradeModal
          nft={selectedNFT}
          account={account}
          onClose={() => setSelectedNFT(null)}
          onSuccess={() => {
            setSelectedNFT(null);
            if (searchAddress) handleScan(searchAddress);
          }}
          onConnectWallet={connectFromModal}
        />
      )}

      <footer className="footer">
        <span>Powered by <a href="#" onClick={(e) => e.preventDefault()}>BORT</a></span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
